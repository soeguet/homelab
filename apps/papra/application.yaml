apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: papra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/soeguet/homelab.git
    targetRevision: HEAD
    path: apps/papra/base
  destination:
    server: https://kubernetes.default.svc
    namespace: papra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
